<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
  <defs>
    <linearGradient id="lg" gradientUnits="userSpaceOnUse" x1="300" y1="100" x2="600" y2="100">
      <stop offset="0%"   stop-color="#0078D4" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#0078D4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes draw      { from { stroke-dashoffset: 300;  } to { stroke-dashoffset: 0; } }
    @keyframes drawname  { from { stroke-dashoffset: 2000; } to { stroke-dashoffset: 0; } }
    @keyframes drawsub   { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
    @keyframes drawstack { from { stroke-dashoffset: 1800; } to { stroke-dashoffset: 0; } }
    .dl    { stroke-dasharray: 300;  stroke-dashoffset: 300;  animation: draw      2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards; }
    .nm    { stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: drawname  2.5s cubic-bezier(0.22,1,0.36,1) 0.0s forwards; }
    .sub   { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawsub   2s cubic-bezier(0.22,1,0.36,1) 1.0s forwards; }
    .stack { stroke-dasharray: 1800; stroke-dashoffset: 1800; animation: drawstack 2s cubic-bezier(0.22,1,0.36,1) 1.4s forwards; }
  </style>

  <text x="450" y="178" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="210" font-weight="100" fill="#0078D4" opacity="0.03" text-anchor="middle" dominant-baseline="auto" letter-spacing="14">RS</text>

  <!-- Name — stroke animates in, fill is always there -->
  <text class="nm" x="450" y="84"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="56" font-weight="200"
    fill="none" stroke="#F5F5F7" stroke-width="0.6"
    text-anchor="middle" letter-spacing="10">RIPAL SUTHAR</text>

  <!-- Glowing line -->
  <line class="dl" x1="300" y1="100" x2="600" y2="100" stroke="url(#lg)" stroke-width="1.2"/>

  <!-- Role -->
  <text class="sub" x="450" y="132"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="10.5" font-weight="400"
    fill="none" stroke="#86868B" stroke-width="0.4"
    text-anchor="middle" letter-spacing="9">DATA ENGINEER</text>

  <!-- Stack -->
  <text class="stack" x="450" y="157"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="10" font-weight="300"
    fill="none" stroke="#3A3A3C" stroke-width="0.3"
    text-anchor="middle" letter-spacing="1.8">Databricks · Spark · Delta Lake · Cloud (AWS / Azure / GCP)</text>
</svg>
