<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg2" gradientUnits="userSpaceOnUse" x1="350" y1="14" x2="550" y2="14">
      <stop offset="0%"   stop-color="#0078D4" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#0078D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes draw2    { from { stroke-dashoffset: 200;  } to { stroke-dashoffset: 0; } }
    @keyframes drawq    { from { stroke-dashoffset: 2000; } to { stroke-dashoffset: 0; } }
    @keyframes drawa    { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
    .fl { stroke-dasharray: 200;  stroke-dashoffset: 200;  animation: draw2 2s cubic-bezier(0.22,1,0.36,1) 0.2s forwards; }
    .fq { stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: drawq 2.5s cubic-bezier(0.22,1,0.36,1) 0.6s forwards; }
    .fa { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawa 2s cubic-bezier(0.22,1,0.36,1) 1.4s forwards; }
  </style>
  <line class="fl" x1="350" y1="14" x2="550" y2="14" stroke="url(#lg2)" stroke-width="0.8"/>
  <text class="fq" x="450" y="46" font-family="Georgia,'Times New Roman',serif" font-size="12.5" font-style="italic" fill="none" stroke="#6E6E73" stroke-width="0.4" text-anchor="middle" letter-spacing="0.3">"Data is the new oil — but only if you know how to refine it."</text>
  <text class="fa" x="450" y="70" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="none" stroke="#3A3A3C" stroke-width="0.3" text-anchor="middle" letter-spacing="3">© Ripal Suthar</text>
</svg>
